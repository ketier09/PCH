name: Arduino Build (ESP32 via GitHub libs)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries from GitHub
        run: |
          set -e
          # Firebase
          arduino-cli lib install --git-url https://github.com/mobizt/Firebase-ESP-Client.git
          # ESP32 Servo
          arduino-cli lib install --git-url https://github.com/madhephaestus/ESP32Servo.git
          # Adafruit deps + displays
          arduino-cli lib install --git-url https://github.com/adafruit/Adafruit_BusIO.git
          arduino-cli lib install --git-url https://github.com/adafruit/Adafruit-GFX-Library.git
          arduino-cli lib install --git-url https://github.com/adafruit/Adafruit_ILI9341.git
          # LittleFS for ESP32 (lorol)
          arduino-cli lib install --git-url https://github.com/lorol/LITTLEFS.git
          # ArduinoJson
          arduino-cli lib install --git-url https://github.com/bblanchon/ArduinoJson.git

      - name: Compile (verbose + warnings) and save log
        run: |
          set -o pipefail
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --warnings all \
            --verbose \
            --export-binaries \
            . |& tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
