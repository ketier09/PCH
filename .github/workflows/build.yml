name: Arduino Build (ESP32, verbose)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure Board Manager (ESP32)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Update library index
        run: arduino-cli lib update-index

      - name: Install required libraries
        run: |
          arduino-cli lib install "Firebase ESP Client"
          arduino-cli lib install "ESP32Servo"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit ILI9341"
          arduino-cli lib install "LittleFS_esp32"
          arduino-cli lib install "ArduinoJson"

      - name: Compile (verbose + warnings) and save log
        run: |
          set -o pipefail
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --warnings all \
            --verbose \
            --export-binaries \
            . |& tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
