name: Arduino Build (ESP32 with Library Manager)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Update library index
        run: arduino-cli lib update-index

      - name: Install libraries (Library Manager preferred, fallback to GitHub if needed)
        run: |
          set -e

          # Normal Library Manager installs
          arduino-cli lib install "ESP32Servo"
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit ILI9341"
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "Firebase Arduino Client Library for ESP8266 and ESP32"

      - name: Compile (verbose + warnings) and save log
        run: |
          set -o pipefail
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --warnings all \
            --verbose \
            --build-property build.partitions=huge_app \
            --build-property upload.maximum_size=3145728 \
            --export-binaries \
            . |& tee build.log


      - name: Upload build log (always show even if compile fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
