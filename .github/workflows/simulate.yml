name: Simulación lógica PCH (ESP32)

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Build simulation tests
        run: |
          mkdir -p build_tests
          g++ -std=c++17 \
            -I. \
            tests/test_simulacion.cpp \
            Datos.cpp \
            Caudalimetro.cpp \
            Ultrasonico.cpp \
            Actuador_digital.cpp \
            Motor.cpp \
            -o build_tests/test_simulacion

      - name: Run simulation tests
        run: |
          ./build_tests/test_simulacion
